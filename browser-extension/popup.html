<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .status {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: none;
            border-radius: 3px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h3>Tiny DFR Browser Helper</h3>
    
    <div id="status" class="status disconnected">
        Disconnected from tiny-dfr
    </div>
    
    <div class="info">
        <p>This extension provides browser control for tiny-dfr touchbar integration.</p>
        <p>Make sure tiny-dfr is running and the browser helper server is active.</p>
    </div>
    
    <button id="reconnect">Reconnect</button>
    
    <script src="popup.js"></script>
</body>
</html>
